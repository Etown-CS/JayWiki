<!-- frontend/src/app/core/nav/nav.html -->
<nav class="bg-[#162338] border-b border-white/[0.07] sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2.5">
        <span class="font-playfair text-xl font-bold text-white tracking-tight">
          Jay<span class="text-[#4A90C4]">Wiki</span>
        </span>
      </a>

      <!-- Primary links -->
      <div class="hidden md:flex items-center gap-1">
        <a routerLink="/explore"
           routerLinkActive="bg-white/10 text-white"
           class="px-3 py-1.5 rounded-md text-sm text-white/70 hover:text-white hover:bg-white/8 transition-colors">
          Explore
        </a>
        <a routerLink="/events"
           routerLinkActive="bg-white/10 text-white"
           class="px-3 py-1.5 rounded-md text-sm text-white/70 hover:text-white hover:bg-white/8 transition-colors">
          Events
        </a>
        <a routerLink="/courses"
           routerLinkActive="bg-white/10 text-white"
           class="px-3 py-1.5 rounded-md text-sm text-white/70 hover:text-white hover:bg-white/8 transition-colors">
          Courses
        </a>
        <a *ngIf="auth.isLoggedIn"
           routerLink="/dashboard"
           routerLinkActive="bg-white/10 text-white"
           class="px-3 py-1.5 rounded-md text-sm text-white/70 hover:text-white hover:bg-white/8 transition-colors">
          My Portfolio
        </a>
      </div>

      <!-- Right side: avatar or sign-in buttons -->
      <div class="flex items-center gap-3">

        <ng-container *ngIf="auth.isLoggedIn; else loggedOut">
          <!-- Avatar — links to own dashboard -->
          <a routerLink="/dashboard" class="flex items-center gap-2.5 group">

            <ng-container *ngIf="currentUser?.profileImageUrl; else initialsAvatar">
              <img
                [src]="currentUser!.profileImageUrl"
                [alt]="currentUser!.name"
                class="w-8 h-8 rounded-full object-cover ring-2 ring-white/20
                       group-hover:ring-[#4A90C4] transition-all"
              />
            </ng-container>

            <ng-template #initialsAvatar>
              <div class="w-8 h-8 rounded-full bg-[#4A90C4]/20 ring-2 ring-white/20
                          group-hover:ring-[#4A90C4] transition-all
                          flex items-center justify-center">
                <span class="text-xs font-semibold text-[#4A90C4]">
                  {{ getInitials(currentUser?.name ?? auth.userName) }}
                </span>
              </div>
            </ng-template>

            <span class="hidden sm:block text-sm text-white/70 group-hover:text-white transition-colors">
              {{ currentUser?.name ?? auth.userName }}
            </span>
          </a>

          <button
            (click)="auth.logout()"
            class="px-3 py-1.5 rounded-md text-sm text-white/60
                   hover:text-white hover:bg-white/8 transition-colors">
            Sign out
          </button>
        </ng-container>

        <ng-template #loggedOut>
          <a routerLink="/login"
             class="px-3 py-1.5 rounded-md text-sm text-white/70
                    hover:text-white hover:bg-white/8 transition-colors">
            Sign in
          </a>
          <a routerLink="/login"
             class="px-4 py-1.5 rounded-md text-sm font-medium bg-[#4A90C4] text-white
                    hover:bg-[#5ba3d9] transition-colors">
            Get Started
          </a>
        </ng-template>

      </div>
    </div>
  </div>
</nav>
