<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="bg-white p-10 rounded-2xl shadow-md w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-gray-800 mb-2">JayWiki</h1>
      <p class="text-gray-500 text-sm">Sign in to access your portfolio</p>
    </div>

    <!-- OAuth Buttons -->
    <button
      (click)="loginGoogle()"
      class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-lg px-4 py-3 mb-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
      <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <button
      (click)="loginMicrosoft()"
      class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-lg px-4 py-3 mb-6 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
      <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022"/>
        <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00"/>
        <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF"/>
        <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900"/>
      </svg>
      Sign in with Microsoft
    </button>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400 font-medium">or</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <!-- Toggle Sign In / Register -->
    <div class="flex rounded-lg border border-gray-200 p-1 mb-5 bg-gray-50">
      <button
        (click)="mode = 'login'"
        [class]="mode === 'login'
          ? 'flex-1 text-sm font-medium py-1.5 rounded-md bg-white shadow-sm text-gray-800 transition'
          : 'flex-1 text-sm font-medium py-1.5 rounded-md text-gray-500 transition hover:text-gray-700'">
        Sign In
      </button>
      <button
        (click)="mode = 'register'"
        [class]="mode === 'register'
          ? 'flex-1 text-sm font-medium py-1.5 rounded-md bg-white shadow-sm text-gray-800 transition'
          : 'flex-1 text-sm font-medium py-1.5 rounded-md text-gray-500 transition hover:text-gray-700'">
        Register
      </button>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600">
      {{ errorMessage }}
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="mb-4 px-4 py-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-600">
      {{ successMessage }}
    </div>

    <!-- Email/Password Form -->
    <div class="flex flex-col gap-3">
      <!-- Name field (register only) -->
      <input
        *ngIf="mode === 'register'"
        [(ngModel)]="name"
        type="text"
        placeholder="Full name"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />

      <input
        [(ngModel)]="email"
        type="email"
        placeholder="Email address"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />

      <input
        [(ngModel)]="password"
        type="password"
        placeholder="Password"
        (keydown.enter)="mode === 'login' ? loginLocal() : register()"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />

      <button
        (click)="mode === 'login' ? loginLocal() : register()"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium text-sm rounded-lg px-4 py-3 transition">
        {{ loading ? 'Please wait...' : (mode === 'login' ? 'Sign In' : 'Create Account') }}
      </button>
    </div>
  </div>
</div>
